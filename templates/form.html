<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admission Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: pink; /* Pink outer border as seen in screenshot */
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .page-wrapper {
            background-color: #add8e6; /* Light blue background for the content */
            width: 100%;
            max-width: 1000px;
            padding: 40px;
            box-sizing: border-box;
        }
        h1 {
            text-align: center;
            color: #000;
            font-weight: bold;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        .section-container {
            background-color: #add8e6;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input[type=text], input[type=email], input[type=date], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .inline-group {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 15px 0;
        }
        .inline-group label {
            display: inline;
            margin: 0;
        }
        .inline-group select, .inline-group input[type=radio] {
            width: auto;
        }
        .address-textarea {
            height: 100px;
            resize: none;
        }
        .eid-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .eid-group label {
            display: inline;
            margin: 0;
        }
        .eid-group input {
            width: 200px;
        }
        .submit-btn {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            border: none;
            cursor: pointer;
            width: 100%;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 4px;
        }
        .submit-btn:hover {
            background-color: #45a049;
        }
        hr {
            border: 0;
            border-top: 1px solid #fff;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <h1>PURNEA UNIVERSITY</h1>
        <hr>
        <form action="{% url 'webpage3' %}" method="POST">
            {% csrf_token %}
            
            <!-- Section 1 -->
            <div class="section-container">
                <div class="form-group">
                    <label>Student Name:</label>
                    <input type="text" name="student-name" placeholder="Student name" required />
                </div>

                <div class="form-group">
                    <label>Father's Name:</label>
                    <input type="text" name="father-name" placeholder="Father's name" required />
                </div>

                <div class="form-group">
                    <label>Mother's Name:</label>
                    <input type="text" name="mother-name" placeholder="Mother's name" required />
                </div>

                <div class="form-group">
                    <label>Course:</label>
                    <select name="course" required>
                        <option value="">Select Course</option>
                        <option value="BCA">BCA</option>
                        <option value="BBA">BBA</option>
                        <option value="B.Tech">B.Tech</option>
                        <option value="MBA">MBA</option>
                        <option value="MCA">MCA</option>
                        <option value="M.Tech">M.Tech</option>
                    </select>
                </div>

                <div class="inline-group">
                    <label>Gender:</label>
                    <input type="radio" name="gender" value="Male" checked> Male
                    <input type="radio" name="gender" value="Female"> Female
                    <input type="radio" name="gender" value="Other"> Other
                </div>

                <div class="form-group">
                    <label>Date of Birth:</label>
                    <input type="date" name="dob" required />
                </div>

                <div class="form-group">
                    <label>Religion:</label>
                    <input type="text" name="religion" required />
                </div>
            </div>

            <hr style="height: 20px; border:none; background: transparent;">

            <!-- Section 2 -->
            <div class="section-container">
                <div class="form-group">
                    <label>Nationality:</label>
                    <input type="text" name="nationality" required />
                </div>

                <div class="form-group">
                    <label>Blood Group:</label>
                    <input type="text" name="blood-group" required />
                </div>

                <div class="inline-group">
                    <label>Marital Status:</label>
                    <input type="radio" name="marital-status" value="single" required> Single
                    <input type="radio" name="marital-status" value="married" required> Married
                </div>

                <div class="form-group">
                    <label>Phone:</label>
                    <input type="text" name="phone" placeholder="Phone number" required />
                </div>

                <div class="form-group">
                    <label>Full Address:</label>
                    <textarea name="address" class="address-textarea" placeholder="Current Address" required></textarea>
                </div>

                <div class="eid-group">
                    <label>EID</label>
                    <input type="email" name="eid" placeholder="Enter Email" required>
                </div>

                <button type="submit" class="submit-btn">Submit</button>
            </div>
        </form>
    </div>
</body>
</html>
